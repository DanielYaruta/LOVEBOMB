<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVEBOMB</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="stage">
    <img class="bg" src="lovebomb.png" alt="Плюшевый мишка с бомбой любви">

    <div class="screen">
      <div class="timer-display" id="timerDisplay">5:00</div>
      <div class="message-line" id="messageLine"></div>
    </div>

    <div class="control-panel">
      <select id="minutesSelect"></select>
      <button id="startBtn">Старт</button>
      <button id="resetBtn" disabled>Сброс</button>
    </div>

    <div class="heart-burst" id="heartBurst"></div>
    <div class="heart-rain" id="heartRain"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
